<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="320" fill="#0D1117" rx="16" />
  
  <circle cx="950" cy="60" r="150" fill="#7C3AED" filter="url(#blur)" opacity="0.4" />
  <circle cx="200" cy="280" r="160" fill="#EC4899" filter="url(#blur)" opacity="0.3" />
  
  <rect x="40" y="40" width="1120" height="240" fill="#161B22" rx="14" opacity="0.7" />
  <rect x="40" y="40" width="1120" height="240" fill="none" stroke="#30363D" stroke-width="2" rx="14" />
  
  <text x="600" y="140" font-family="Segoe UI, system-ui, sans-serif" font-size="84" font-weight="800" fill="url(#grad)" text-anchor="middle" letter-spacing="-3" filter="url(#glow)">BestArmor</text>
  <text x="600" y="200" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="500" fill="#8B949E" text-anchor="middle" letter-spacing="4">WINDOWS DESKTOP DEVELOPER</text>
  
  <circle cx="560" cy="240" r="5" fill="#7C3AED" />
  <circle cx="600" cy="240" r="5" fill="#A78BFA" />
  <circle cx="640" cy="240" r="5" fill="#EC4899" />
</svg>
