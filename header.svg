<svg width="1400" height="380" viewBox="0 0 1400 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262D" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="1400" height="380" fill="#0D1117" rx="16" />
  <rect width="1400" height="380" fill="url(#grid)" opacity="0.3" rx="16" />
  
  <circle cx="1100" cy="80" r="180" fill="#7C3AED" filter="url(#blur)" opacity="0.5" />
  <circle cx="250" cy="340" r="190" fill="#EC4899" filter="url(#blur)" opacity="0.4" />
  
  <rect x="40" y="40" width="1320" height="300" fill="#0D1117" rx="14" opacity="0.65" />
  <rect x="40" y="40" width="1320" height="300" fill="none" stroke="#30363D" stroke-width="2" rx="14" />
  
  <text x="700" y="170" font-family="Segoe UI, system-ui, sans-serif" font-size="96" font-weight="800" fill="url(#grad)" text-anchor="middle" letter-spacing="-4" filter="url(#glow)">BestArmor</text>
  <text x="700" y="240" font-family="Segoe UI, system-ui, sans-serif" font-size="32" font-weight="500" fill="#8B949E" text-anchor="middle" letter-spacing="6">WINDOWS DESKTOP DEVELOPER</text>
  
  <circle cx="640" cy="290" r="6" fill="#7C3AED" />
  <circle cx="700" cy="290" r="6" fill="#A78BFA" />
  <circle cx="760" cy="290" r="6" fill="#EC4899" />
</svg>
